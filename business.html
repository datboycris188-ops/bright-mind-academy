<nav class="navbar navbar-expand-lg navbar-dark bg-primary">
  <div class="container">

    <a class="navbar-brand" href="index.html">
      Bright Mind Academy
    </a>

    <div>
      <a class="text-white me-3" href="index.html">Home</a>
      <a class="text-white me-3" href="about.html">About</a>

<section class="container py-5">

  <h1>Student Enrollment</h1>

  <p>
    Enroll today to start improving your academic performance.
  </p>

  <form>

    <div class="mb-3">

      <label for="studentName" class="form-label">
        Student Name
      </label>

      <input type="text"
      class="form-control"
      id="studentName"
      required>

    </div>

    <div class="mb-3">

      <label for="grade" class="form-label">
        Grade Level
      </label>

      <input type="text"
      class="form-control"
      id="grade"
      required>

    </div>

    <div class="mb-3">

      <label for="subject" class="form-label">
        Subject
      </label>

      <input type="text"
      class="form-control"
      id="subject"
      required>

    </div>

    <button class="btn btn-primary">
      Enroll Now
    </button>

  </form>

</section>

<footer class="bg-primary text-white text-center p-3">
