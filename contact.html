<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Contact | Bright Mind Academy</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body>

<nav class="navbar navbar-expand-lg navbar-dark bg-primary">
  <div class="container">

    <a class="navbar-brand" href="index.html">
      Bright Mind Academy
    </a>

    <div>
      <a class="text-white me-3" href="index.html">Home</a>
      <a class="text-white me-3" href="about.html">About</a>
      <a class="text-white me-3" href="services.html">Services</a>
      <a class="text-white me-3" href="business.html">Programs</a>
      <a class="text-white" href="contact.html">Contact</a>
    </div>

  </div>
</nav>

<section class="container py-5">

  <h1>Contact Us</h1>

  <div class="row">

    <div class="col-md-6">

      <form>

        <div class="mb-3">

          <label for="name" class="form-label">
            Name
          </label>

          <input type="text"
          class="form-control"
          id="name"
          required>

        </div>

        <div class="mb-3">

          <label for="email" class="form-label">
            Email
          </label>

          <input type="email"
          class="form-control"
          id="email"
          required>

        </div>

        <div class="mb-3">

          <label for="message" class="form-label">
            Message
          </label>

          <textarea class="form-control"
          id="message"
          rows="4"
          required></textarea>

        </div>

        <button class="btn btn-primary">
          Send Message
        </button>

      </form>

    </div>

    <div class="col-md-6">

      <h3>Contact Information</h3>

      <p>Email: info@brightmindacademy.com</p>

      <p>Phone: (555) 123-4567</p>

      <p>Address: 123 Learning Ave, New York, NY</p>

    </div>

  </div>

</section>

<footer class="bg-primary text-white text-center p-3">

  <p>
    © 2026 Bright Mind Academy
  </p>

</footer>

</body>
</html>
